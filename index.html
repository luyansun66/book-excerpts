<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="摘录" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>摘录 — 阅读摘录管理</title>
    <meta name="description" content="管理你的阅读摘录和个人感悟" />
    <meta name="theme-color" content="#F6F0E7" />
    <link rel="manifest" href="manifest-pwa.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <style>html, body { height: 100%; margin: 0; overflow: hidden; } body { padding-top: env(safe-area-inset-top, 0px); box-sizing: border-box; } #root { height: 100%; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register Service Worker for offline & PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(
            (reg) => console.log('SW registered:', reg.scope),
            (err) => console.warn('SW registration failed:', err),
          );
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

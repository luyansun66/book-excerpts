<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导入《德米安》</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0e8d4;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; margin: 0; padding: 20px; text-align: center;
    }
    .card {
      background: #FFFDF4; border-radius: 20px; padding: 32px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 320px; width: 100%;
    }
    h1 { font-family: Georgia, serif; font-size: 22px; color: #2c2416; margin: 0 0 8px; }
    p { font-size: 13px; color: #8a7a60; line-height: 1.6; margin: 4px 0; }
    .logo { font-size: 48px; margin-bottom: 12px; }
    .btn {
      display: inline-block; padding: 12px 24px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; margin-top: 16px; width: 100%; box-sizing: border-box;
    }
    .btn-primary { background: #2a1e0e; color: #f0e8d4; }
    .btn-danger { background: #c0392b; color: white; }
    .btn-secondary { background: transparent; color: #8a7a60; border: 1px solid #d4c4a0; }
    .status { margin: 16px 0 0; padding: 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; display: none; }
    .status.show { display: block; }
    .status.loading { background: #fff8e0; color: #8a7a40; }
    .status.success { background: #e8f5e0; color: #2d6a30; }
    .status.error { background: #ffe8e0; color: #a04030; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📖</div>
    <h1>导入《德米安》</h1>
    <p>作者：黑塞 · 分类：小说</p>
    <p style="margin-top:12px;font-size:12px;color:#b8ae9a">
      将自动导入 1 本书 + 25 条精选摘录
    </p>

    <a href="/?seed=demian" class="btn btn-primary">导入《德米安》</a>

    <button onclick="resetAndImport()" class="btn btn-danger" style="margin-top:8px">
      清除旧数据并重新导入
    </button>

    <div id="status" class="status">准备中…</div>
  </div>

  <script>
    async function resetAndImport() {
      const status = document.getElementById('status');
      status.className = 'status show loading';
      status.textContent = '⏳ 正在清除旧数据…';

      try {
        await new Promise((resolve, reject) => {
          const req = indexedDB.deleteDatabase('bookwrite');
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
          req.onblocked = () => {
            // If the DB is blocked, retry after a moment
            setTimeout(() => {
              const req2 = indexedDB.deleteDatabase('bookwrite');
              req2.onsuccess = () => resolve();
              req2.onerror = () => reject(req2.error);
            }, 500);
          };
        });

        status.textContent = '✅ 已清除旧数据，正在跳转导入…';
        setTimeout(() => {
          window.location.href = '/?seed=demian';
        }, 800);
      } catch (e) {
        status.className = 'status show error';
        status.textContent = '❌ 清除失败：' + (e?.message || e);
      }
    }
  </script>
</body>
</html>
